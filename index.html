<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lección 21 - Democracia y Participación Ciudadana</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f8ff;overflow:hidden;width:100%;height:100vh;}
  .presentation{width:100%;height:100vh;position:relative;overflow:hidden;}
  .slide{display:none;width:100%;height:100vh;position:absolute;top:0;left:0;animation:fadeIn 0.4s ease;}
  .slide.active{display:flex;flex-direction:column;}
  @keyframes fadeIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

  /* NAVEGACIÓN */
  .nav-arrow{position:fixed;top:50%;transform:translateY(-50%);width:50px;height:50px;background:#db6015;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1000;box-shadow:0 4px 15px rgba(219,96,21,0.45);transition:all 0.3s;}
  .nav-arrow:hover{background:#993921;transform:translateY(-50%) scale(1.12);}
  .nav-arrow svg{width:22px;height:22px;fill:white;}
  .nav-left{left:8px;}
  .nav-right{right:8px;}
  .nav-arrow.hidden{opacity:0.15;pointer-events:none;}
  .progress-bar{position:fixed;top:0;left:0;height:5px;background:linear-gradient(90deg,#db6015,#f7be00);transition:width 0.4s ease;z-index:999;}
  .slide-counter{position:fixed;bottom:10px;right:65px;font-size:11px;color:#244b5a;font-weight:bold;z-index:999;background:rgba(255,255,255,0.85);padding:3px 10px;border-radius:20px;}

  /* SCROLL INTERNO */
  .slide-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 70px 24px 70px;}
  .slide-scroll::-webkit-scrollbar{width:5px;}
  .slide-scroll::-webkit-scrollbar-thumb{background:#db6015;border-radius:10px;}

  /* HEADER INTERNO */
  .slide-header{padding:16px 70px 4px;text-align:center;}
  .slide-tag{display:inline-block;background:#db6015;color:#fff;font-size:11px;font-weight:bold;padding:3px 14px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .slide-tag.yellow{background:#f7be00;color:#244b5a;}
  .slide-tag.blue{background:#244b5a;}
  .slide-tag.red{background:#993921;}
  .slide-title{font-size:21px;font-weight:bold;color:#244b5a;line-height:1.2;}

  /* ── PORTADA ── */
  .portada-bg{background:linear-gradient(135deg,#244b5a 0%,#1a3545 55%,#993921 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 80px;height:100vh;}
  .portada-badge{background:rgba(247,190,0,0.18);border:2px solid #f7be00;border-radius:30px;padding:5px 20px;color:#f7be00;font-size:11px;font-weight:bold;letter-spacing:2px;margin-bottom:14px;}
  .portada-title{font-size:26px;font-weight:bold;color:#fff;margin-bottom:8px;line-height:1.2;}
  .portada-subtitle{font-size:15px;color:#f7be00;margin-bottom:18px;font-weight:600;}
  .portada-cards{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap;justify-content:center;}
  .portada-card{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:12px 16px;text-align:center;min-width:90px;}
  .portada-card .pc-emoji{font-size:26px;display:block;margin-bottom:5px;}
  .portada-card .pc-label{font-size:10px;color:rgba(255,255,255,0.85);font-weight:600;}
  .portada-msg{background:rgba(247,190,0,0.14);border-left:4px solid #f7be00;border-radius:12px;padding:12px 18px;color:#fff;font-size:13px;font-style:italic;margin-top:14px;max-width:460px;}
  .portada-info{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
  .portada-info-item{background:rgba(255,255,255,0.1);border-radius:10px;padding:5px 14px;color:rgba(255,255,255,0.9);font-size:11px;font-weight:600;}

  /* ── TARJETAS GENERALES ── */
  .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(36,75,90,0.09);margin-bottom:12px;}
  .card-orange{border-left:5px solid #db6015;}
  .card-yellow{border-left:5px solid #f7be00;}
  .card-blue{border-left:5px solid #244b5a;}
  .card-red{border-left:5px solid #993921;}
  .card-grad-orange{background:linear-gradient(135deg,#db6015,#993921);color:#fff;}
  .card-grad-blue{background:linear-gradient(135deg,#244b5a,#1a3545);color:#fff;}
  .card-grad-yellow{background:linear-gradient(135deg,#f7be00,#e5a800);}

  /* ── OBJETIVOS ── */
  .obj-card{background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 10px rgba(36,75,90,0.08);border-left:5px solid #db6015;transition:transform 0.2s;}
  .obj-card:nth-child(2){border-left-color:#f7be00;}
  .obj-card:nth-child(3){border-left-color:#244b5a;}
  .obj-card:hover{transform:translateX(4px);}
  .obj-num{background:#db6015;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:15px;flex-shrink:0;}
  .obj-card:nth-child(2) .obj-num{background:#f7be00;color:#244b5a;}
  .obj-card:nth-child(3) .obj-num{background:#244b5a;}
  .obj-text{font-size:13px;color:#244b5a;line-height:1.5;}
  .obj-text strong{color:#db6015;}

  /* ── CONOCIMIENTOS PREVIOS ── */
  .kp-card{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 2px 10px rgba(36,75,90,0.08);cursor:pointer;border:2px solid transparent;transition:all 0.3s;}
  .kp-card:hover{border-color:#f7be00;transform:translateY(-2px);}
  .kp-icon{font-size:30px;flex-shrink:0;}
  .kp-q{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:3px;}
  .kp-sub{font-size:12px;color:#666;}

  /* ── PALABRAS CLAVE ── */
  .kw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .kw-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(36,75,90,0.09);text-align:center;border-top:4px solid #db6015;transition:all 0.3s;cursor:pointer;}
  .kw-card:nth-child(2){border-top-color:#f7be00;}
  .kw-card:nth-child(3){border-top-color:#244b5a;}
  .kw-card:nth-child(4){border-top-color:#993921;}
  .kw-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(36,75,90,0.15);}
  .kw-emoji{font-size:34px;margin-bottom:6px;}
  .kw-word{font-size:15px;font-weight:bold;color:#244b5a;margin-bottom:5px;}
  .kw-def{font-size:12px;color:#555;line-height:1.4;}

  /* ── BLOQUES CONTENIDO ── */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  .content-block{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(36,75,90,0.08);}
  .cb-icon{font-size:26px;margin-bottom:6px;}
  .cb-title{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:5px;}
  .cb-text{font-size:12px;color:#444;line-height:1.5;}
  .banner{border-radius:16px;padding:16px 20px;margin-bottom:14px;text-align:center;}
  .banner-orange{background:linear-gradient(135deg,#db6015,#993921);color:#fff;}
  .banner-blue{background:linear-gradient(135deg,#244b5a,#1a3545);color:#fff;}
  .banner-yellow{background:linear-gradient(135deg,#f7be00,#e5a800);}
  .banner-icon{font-size:34px;margin-bottom:6px;}
  .banner-title{font-size:16px;font-weight:bold;margin-bottom:4px;}
  .banner-text{font-size:13px;opacity:0.95;line-height:1.5;}

  /* Lista estilizada */
  .styled-list{list-style:none;padding:0;}
  .styled-list li{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#f0f8ff;border-radius:10px;margin-bottom:7px;font-size:13px;color:#244b5a;}
  .styled-list li::before{content:attr(data-icon);font-size:18px;flex-shrink:0;}

  /* Esquema / timeline */
  .timeline{padding:4px 0;}
  .tl-item{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start;}
  .tl-dot{width:36px;height:36px;border-radius:50%;background:#db6015;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .tl-dot.blue{background:#244b5a;}
  .tl-dot.yellow{background:#f7be00;color:#244b5a;}
  .tl-dot.red{background:#993921;}
  .tl-content{background:#fff;border-radius:12px;padding:10px 14px;flex:1;box-shadow:0 2px 8px rgba(36,75,90,0.08);}
  .tl-title{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:3px;}
  .tl-text{font-size:12px;color:#555;line-height:1.4;}

  /* ── EXPLORACIÓN INTERACTIVA ── */
  .explore-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .explore-item{background:#fff;border-radius:16px;padding:16px 12px;text-align:center;box-shadow:0 2px 12px rgba(36,75,90,0.09);cursor:pointer;transition:all 0.3s;border:2px solid transparent;}
  .explore-item:hover{border-color:#db6015;transform:translateY(-4px);}
  .ei-icon{font-size:36px;margin-bottom:6px;}
  .ei-title{font-size:12px;font-weight:bold;color:#244b5a;margin-bottom:4px;}
  .ei-cta{font-size:11px;color:#db6015;font-weight:600;}

  /* Popup */
  .popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1999;}
  .popup-overlay.show{display:block;}
  .popup-box{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:20px;padding:24px;max-width:360px;width:90%;z-index:2000;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
  .popup-box.show{display:block;animation:popIn 0.3s ease;}
  @keyframes popIn{from{transform:translate(-50%,-50%) scale(0.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
  .popup-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#666;}
  .popup-icon{font-size:46px;margin-bottom:8px;}
  .popup-title{font-size:17px;font-weight:bold;color:#244b5a;margin-bottom:8px;}
  .popup-text{font-size:13px;color:#555;line-height:1.6;}
  .popup-hl{background:#f0f8ff;border-radius:10px;padding:9px;margin-top:10px;font-size:12px;color:#db6015;font-weight:600;}

  /* ── ACTIVIDADES ── */
  .act-banner{background:linear-gradient(135deg,#db6015,#993921);border-radius:14px;padding:12px 18px;color:#fff;text-align:center;margin-bottom:14px;}
  .act-banner .ab-icon{font-size:26px;margin-bottom:4px;}
  .act-banner .ab-title{font-size:15px;font-weight:bold;}
  .act-banner .ab-sub{font-size:11px;opacity:0.9;margin-top:2px;}

  .question-block{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 2px 12px rgba(36,75,90,0.08);margin-bottom:12px;}
  .q-text{font-size:13px;font-weight:bold;color:#244b5a;margin-bottom:12px;line-height:1.4;}
  .options-col{display:flex;flex-direction:column;gap:7px;}
  .option-btn{background:#f0f8ff;border:2px solid #e0edf5;border-radius:11px;padding:10px 14px;text-align:left;cursor:pointer;font-size:12px;color:#244b5a;transition:all 0.3s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
  .option-btn:hover:not(:disabled){background:#e0edf5;border-color:#db6015;}
  .option-btn.correct{background:#e8f8e8;border-color:#28a745;color:#155724;}
  .option-btn.incorrect{background:#fde8e8;border-color:#dc3545;color:#721c24;}
  .option-btn:disabled{cursor:default;}
  .feedback{display:none;border-radius:11px;padding:10px 14px;margin-top:10px;font-size:12px;line-height:1.5;}
  .feedback.show{display:block;animation:fadeIn 0.3s;}
  .feedback.success{background:#e8f8e8;border-left:4px solid #28a745;color:#155724;}
  .feedback.error{background:#fde8e8;border-left:4px solid #dc3545;color:#721c24;}
  .retry-btn{background:#db6015;color:#fff;border:none;border-radius:18px;padding:6px 18px;font-size:11px;cursor:pointer;margin-top:7px;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-weight:600;transition:background 0.2s;}
  .retry-btn:hover{background:#993921;}

  /* Juego - clasificar */
  .game-block{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 2px 12px rgba(36,75,90,0.08);margin-bottom:12px;}
  .game-title{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:12px;text-align:center;}
  .situation-box{background:linear-gradient(135deg,#244b5a,#1a3545);color:#fff;border-radius:12px;padding:13px 16px;font-size:12px;margin-bottom:12px;text-align:center;line-height:1.5;}
  .classify-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .cls-btn{background:#f0f8ff;border:2px solid #e0edf5;border-radius:11px;padding:10px;font-size:12px;color:#244b5a;cursor:pointer;font-weight:600;transition:all 0.3s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
  .cls-btn:hover:not(:disabled){border-color:#db6015;background:#fff5f0;}
  .cls-btn.correct{background:#e8f8e8;border-color:#28a745;color:#155724;}
  .cls-btn.wrong{background:#fde8e8;border-color:#dc3545;color:#721c24;}
  .game-nav-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .game-nav-btn{background:#f0f8ff;border:2px solid #e0edf5;border-radius:18px;padding:5px 14px;font-size:11px;color:#244b5a;cursor:pointer;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-weight:600;transition:all 0.2s;}
  .game-nav-btn:hover{border-color:#db6015;}
  .game-nav-btn.done{background:#e8f8e8;border-color:#28a745;color:#155724;}

  /* Rellenar */
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .match-left{background:#f0f8ff;border-radius:11px;padding:11px;font-size:12px;color:#244b5a;font-weight:600;border:2px solid #e0edf5;display:flex;align-items:center;gap:8px;}
  select.match-sel{border:2px solid #e0edf5;border-radius:11px;padding:8px;font-size:12px;color:#244b5a;background:#fff;cursor:pointer;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;width:100%;}
  .check-btn{background:linear-gradient(135deg,#db6015,#993921);color:#fff;border:none;border-radius:20px;padding:9px 26px;font-size:13px;cursor:pointer;display:block;margin:12px auto 0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-weight:bold;transition:all 0.3s;}
  .check-btn:hover{transform:scale(1.05);}

  /* Práctica */
  .practical-box{background:linear-gradient(135deg,#f7be00,#e5a800);border-radius:16px;padding:16px 18px;margin-bottom:12px;text-align:center;}
  .pb-icon{font-size:36px;margin-bottom:6px;}
  .pb-title{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:5px;}
  .pb-text{font-size:12px;color:#333;line-height:1.5;}
  .refl-opts{display:flex;flex-direction:column;gap:8px;}
  .refl-btn{background:#fff;border:2px solid #e0edf5;border-radius:11px;padding:12px 14px;font-size:12px;color:#244b5a;cursor:pointer;text-align:left;transition:all 0.3s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
  .refl-btn:hover:not(:disabled){border-color:#244b5a;background:#f0f8ff;}
  .refl-btn.best{background:#e8f8e8;border-color:#28a745;color:#155724;}
  .refl-btn.ok{background:#fff8e8;border-color:#f7be00;color:#7a5f00;}
  .refl-btn.bad{background:#fde8e8;border-color:#dc3545;color:#721c24;}

  /* ── REPASO ── */
  .repaso-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px rgba(36,75,90,0.08);margin-bottom:10px;}
  .rp-header{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
  .rp-num{background:#244b5a;color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0;}
  .rp-q{font-size:12px;font-weight:bold;color:#244b5a;}
  .rp-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .rp-btn{background:#f0f8ff;border:2px solid #e0edf5;border-radius:9px;padding:7px 10px;font-size:11px;color:#244b5a;cursor:pointer;transition:all 0.2s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;text-align:center;}
  .rp-btn:hover:not(:disabled){border-color:#db6015;background:#fff5f0;}
  .rp-btn.correct{background:#e8f8e8;border-color:#28a745;color:#155724;}
  .rp-btn.incorrect{background:#fde8e8;border-color:#dc3545;color:#721c24;}
  .rp-fb{display:none;margin-top:7px;font-size:11px;padding:7px 10px;border-radius:8px;}
  .rp-fb.show{display:block;}
  .rp-fb.success{background:#e8f8e8;color:#155724;}
  .rp-fb.error{background:#fde8e8;color:#721c24;}

  /* ── METACOGNICIÓN ── */
  .meta-card{background:#fff;border-radius:16px;padding:14px 18px;box-shadow:0 2px 10px rgba(36,75,90,0.08);margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}
  .meta-ico{font-size:28px;flex-shrink:0;}
  .meta-q{font-size:14px;font-weight:bold;color:#244b5a;margin-bottom:8px;}
  .meta-stars{display:flex;gap:7px;flex-wrap:wrap;}
  .star-btn{font-size:22px;background:none;border:none;cursor:pointer;filter:grayscale(1);transition:all 0.2s;}
  .star-btn:hover,.star-btn.lit{filter:grayscale(0);transform:scale(1.2);}
  .meta-opts{display:flex;gap:7px;flex-wrap:wrap;}
  .meta-opt{background:#f0f8ff;border:2px solid #e0edf5;border-radius:18px;padding:5px 13px;font-size:11px;color:#244b5a;cursor:pointer;font-weight:600;transition:all 0.2s;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
  .meta-opt:hover,.meta-opt.sel{background:#db6015;color:#fff;border-color:#db6015;}

  /* ── CIERRE ── */
  .cierre-bg{background:linear-gradient(135deg,#244b5a 0%,#1a3545 50%,#993921 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 80px;height:100vh;}
  .sello{width:110px;height:110px;background:linear-gradient(135deg,#f7be00,#e5a800);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;margin:0 auto 16px;box-shadow:0 8px 30px rgba(247,190,0,0.5);}
  .cierre-title{font-size:26px;font-weight:bold;color:#fff;margin-bottom:8px;}
  .cierre-sub{font-size:15px;color:#f7be00;margin-bottom:16px;}
  .cierre-msg{background:rgba(255,255,255,0.1);border-radius:16px;padding:14px 20px;color:rgba(255,255,255,0.92);font-size:13px;line-height:1.6;max-width:440px;margin:0 auto 16px;}
  .cierre-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .cierre-chip{background:rgba(247,190,0,0.2);border:1px solid rgba(247,190,0,0.4);color:#f7be00;font-size:11px;padding:5px 14px;border-radius:20px;font-weight:600;}
</style>
</head>
<body>
<div class="presentation" id="presentation">

  <!-- BARRA PROGRESO -->
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-counter" id="slideCounter"></div>

  <!-- FLECHAS -->
  <button class="nav-arrow nav-left hidden" id="btnPrev" onclick="changeSlide(-1)" aria-label="Anterior">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="nav-arrow nav-right" id="btnNext" onclick="changeSlide(1)" aria-label="Siguiente">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>

  <!-- POPUP OVERLAY -->
  <div class="popup-overlay" id="popupOverlay" onclick="closePopup()"></div>
  <div class="popup-box" id="popupBox">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-icon" id="popupIcon"></div>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-text" id="popupText"></div>
    <div class="popup-hl" id="popupHl" style="display:none"></div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- DIAPOSITIVA 1: PORTADA             -->
  <!-- ═══════════════════════════════════ -->
  <div class="slide active" id="slide-0">
    <div class="portada-bg">
      <div class="portada-badge">CIENCIAS SOCIALES · LECCIÓN 21</div>
